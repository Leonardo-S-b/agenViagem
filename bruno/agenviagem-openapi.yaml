openapi: 3.0.3
info:
  title: AgenViagem API (Bruno Import)
  version: 1.0.0
  description: Coleção OpenAPI para importar no Bruno — endpoints principais para testes CRUD e fluxo de reservas.
servers:
  - url: http://localhost:3000
    description: Local dev server
paths:
  /clientes:
    post:
      summary: Criar cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClienteCreate'
            example:
              nome: "Maria Silva"
              email: "maria@example.com"
              telefone: "+5511999999999"
              cpf: "111.444.777-35"
      responses:
        '201':
          description: Cliente criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
  /viagens:
    post:
      summary: Criar viagem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ViagemCreate'
            example:
              destino: "Fortaleza"
              data_saida: "2026-10-01T09:00:00.000Z"
              data_retorno: "2026-10-10T18:00:00.000Z"
              valor: 1299.90
              total_assentos: 40
      responses:
        '201':
          description: Viagem criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Viagem'
  /reservas:
    post:
      summary: Criar reserva (transacional — evita overbooking)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservaCreate'
            example:
              clienteId: 1
              viagemId: 1
              quantidade_assentos: 2
      responses:
        '201':
          description: Reserva criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reserva'
  /clientes/{id}/reservas:
    get:
      summary: Listar reservas de um cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Lista de reservas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reserva'
  /clientes/{id}/email-reservas:
    post:
      summary: Enviar histórico de reservas por e-mail ao cliente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '202':
          description: Email aceito para envio
        '400':
          description: Requisição inválida ou sem reservas
        '404':
          description: Cliente não encontrado
  /reservas/{id}:
    delete:
      summary: Cancelar / deletar reserva
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Reserva cancelada com sucesso
components:
  schemas:
    ClienteCreate:
      type: object
      required:
        - nome
        - email
        - cpf
      properties:
        nome:
          type: string
        email:
          type: string
          format: email
        telefone:
          type: string
        cpf:
          type: string
          description: "CPF do cliente (ex: 111.444.777-35)"
    Cliente:
      allOf:
        - $ref: '#/components/schemas/ClienteCreate'
        - type: object
          properties:
            id:
              type: integer
    ViagemCreate:
      type: object
      required: [destino, data_saida, data_retorno, valor, total_assentos]
      properties:
        destino:
          type: string
        data_saida:
          type: string
          format: date-time
        data_retorno:
          type: string
          format: date-time
        valor:
          type: number
          format: float
          minimum: 0
        total_assentos:
          type: integer
          minimum: 1
    Viagem:
      allOf:
        - $ref: '#/components/schemas/ViagemCreate'
        - type: object
          properties:
            id:
              type: integer
            assentos_ocupados:
              type: integer
              default: 0
    ReservaCreate:
      type: object
      required: [clienteId, viagemId, quantidade_assentos]
      properties:
        clienteId:
          type: integer
        viagemId:
          type: integer
        quantidade_assentos:
          type: integer
          minimum: 1
    Reserva:
      allOf:
        - $ref: '#/components/schemas/ReservaCreate'
        - type: object
          properties:
            id:
              type: integer
            createdAt:
              type: string
              format: date-time

x-info:
  notes: |
    Importe este arquivo no Bruno (GUI): File → Import → OpenAPI Specification (YAML).
    Depois crie um Environment `local` com `baseURL = http://localhost:3000` e execute os requests na Collection Runner.
